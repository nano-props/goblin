<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- frame-ancestors omitted: it's only effective in HTTP headers,
         not <meta>, and Chromium logs a noisy warning when it appears
         here. Goblin does not embed its client in a frame, so the
         directive carries no real value either way. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' ws: wss:; object-src 'none'; base-uri 'self';"
    />
    <title>Goblin</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" href="/goblin.png" />
    <!-- Module so Vite can process the asset without warnings. It runs
         before the app module and applies theme attrs from URL params. -->
    <script type="module" src="/boot.js"></script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
